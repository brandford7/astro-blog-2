<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <linearGradient id="techGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <!-- Dark mode variant -->
    <linearGradient id="techGradDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- "brandford" in dark/black -->
  <text
    x="0"
    y="58"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
    fill="#0F172A"
  >brandford</text>

  <!-- "tech" in gradient -->
  <text
    x="310"
    y="58"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="-1.5"
    fill="url(#techGrad)"
  >tech</text>

  <!-- Accent dot after "tech" — matches favicon style -->
  <circle cx="509" cy="55" r="5" fill="url(#techGrad)"/>
</svg>
