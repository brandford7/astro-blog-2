    fill="#F8FAFC"
  >brandford</text>

  <!-- "tech" in gradient -->
  <text
    x="321"
    y="54"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1.5"
