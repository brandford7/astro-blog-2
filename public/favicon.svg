<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Left code bracket -->
  <path d="M6 10 L3 16 L6 22" stroke="url(#accentGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right code bracket -->
  <path d="M26 10 L29 16 L26 22" stroke="url(#accentGrad)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- B letterform -->
  <path d="M10 10 L10 22 M10 10 L13.5 10 Q16 10 16 13 Q16 16 10 16 M10 16 L14 16 Q17 16 17 19 Q17 22 13.5 22 L10 22" 
        stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- T letterform -->
  <path d="M19 10 L25 10 M22 10 L22 22" 
        stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Accent dot bottom right -->
  <circle cx="27" cy="26" r="1.5" fill="url(#accentGrad)"/>
</svg>
